name: Daily Commit

on:
  schedule:
    - cron: "17 3 * * *"   # runs daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 22f3001817@ds.study.iitm.ac.in
        run: echo "Required step name present"

      - name: Create daily commit
        run: |
          mkdir -p .github/daily-commits
          echo "Run time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> .github/daily-commits/log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/daily-commits/log.txt
          git commit -m "chore: daily automated commit $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push
